# Remediation advice for security scanners
# This file can be updated without modifying Python source code

gosec:
  G101: "Avoid hardcoding credentials; use environment variables or a secrets manager."
  G102: "Avoid binding services to all interfaces; bind to localhost or specific IPs."
  G103: "Avoid disabling TLS certificate verification; use proper certificates."
  G104: "Handle errors returned by function calls; don't ignore them."
  G201: "Use parameterized queries instead of string formatting for SQL queries."
  G202: "Use parameterized queries instead of string concatenation for SQL queries."
  G204: "Avoid exec.Command with user input; use allowlists for commands."
  G301: "Use restrictive file permissions (0600 or stricter) instead of 0777."
  G302: "Use restrictive file permissions (0600 or stricter) for sensitive files."
  G303: "Use secure temporary file creation; avoid predictable temp file names."
  G304: "Validate file paths to prevent path traversal vulnerabilities."
  G305: "Validate file paths from user input to prevent path traversal."
  G401: "Use strong cryptographic hash functions (SHA-256+) instead of MD5/SHA1."
  G402: "Do not skip TLS certificate verification in production."
  G403: "Use strong random number generation (crypto/rand) instead of math/rand."
  G404: "Use crypto/rand for security-sensitive random number generation."
  G501: "Replace crypto/md5 with crypto/sha256 or other strong hash."
  G502: "Replace crypto/sha1 with crypto/sha256 or other strong hash."
  G503: "Disable fallback to insecure TLS versions."
  G504: "Do not use TLS versions below 1.2."

